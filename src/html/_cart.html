<div id="cart" class="cart">
    <div class="cart__header">
        <h2 class="cart__title">Ваш заказ</h2>
        <button type="button" class="cart__clear">Удалить все</button>
    </div>
    <ul class="cart__list">
        <li class="cart__item">
            <div class="cart__item-thumb">
                <img src="@img/products/02.jpg" class="cover-image" alt="">
            </div>
            <div class="cart__item-name">
                Aroma massage/Арома массаж со свечей
            </div>
            <div class="cart__item-actions">
                <div class="cart__item-counter">
                    <button type="button" class="cart__item-btn cart__item-btn--minus" aria-label="Уменьшить количество"></button>
                    <div class="cart__counter-value">1</div>
                    <button type="button" class="cart__item-btn cart__item-btn--plus" aria-label="Увеличить количество"></button>
                </div>
                <div class="cart__item-price">13 500 ₽</div>
            </div>
        </li>
    </ul>
    <div class="cart__promo">
        <label class="cart__promo-label" for="cart-promo">Введите промокод:</label>
        <input type="text" id="cart-promo" class="cart__promo-input" placeholder="Промокод" autocomplete="off">
    </div>
    <div class="cart__footer">
        <div class="cart__total">
            <div class="cart__total-caption">Итого:</div>
            <div class="cart__total-value">13 500 ₽</div>
        </div>
        <a href="order.html" class="cart__btn btn btn-primary">Оформить заказ</a>
    </div>
</div>
