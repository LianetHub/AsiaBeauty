<!DOCTYPE html>
<html lang="ru">
    @@include('html/_head.html', {
    'title': 'Asia Beauty SPA | Новости'
    })
    <body>
        <div class="wrapper">
            @@include('html/_header.html', {
            "active": "0"
            })
            <main class="page">
                <section class="heading">
                    <div class="container container-lg">
                        <h1 class="heading__title title-lg text-center">блог Asia Beauty Spa</h1>
                    </div>
                </section>
                <section class="news">
                    <div class="container container-lg">
                        <div class="news__filters chips chips--catalog">
                            <label class="chip">
                                <input type="radio" name="category" value="massage" class="hidden" hidden checked>
                                <span class="chip__btn btn">массажи</span>
                            </label>
                            <label class="chip">
                                <input type="radio" name="category" value="promo" class="hidden" hidden>
                                <span class="chip__btn btn">акции</span>
                            </label>
                            <label class="chip">
                                <input type="radio" name="category" value="apartments" class="hidden" hidden>
                                <span class="chip__btn btn">аппартаменты</span>
                            </label>
                            <label class="chip">
                                <input type="radio" name="category" value="spa" class="hidden" hidden>
                                <span class="chip__btn btn">спа-процедуры</span>
                            </label>
                        </div>
                        <h2 class="news__title title-lg">Статьи</h2>
                        <ul class="news__grid">
                            @@loop("./html/templates/_blog-item.html", './html/json/blog.json')
                        </ul>
                    </div>
                </section>
            </main>
            @@include('html/_footer.html', {})
        </div>

        @@include('html/_js.html', {})
    </body>
</html>
