<!DOCTYPE html>
<html lang="ru">
    @@include('html/_head.html', {
    'title': 'Asia Beauty SPA | Поиск'
    })
    <body>
        <div class="wrapper">
            @@include('html/_header.html', {
            "active": "4"
            })
            <main class="page page--search">
                <section class="hero hero--search">
                    <div class="container container-lg">
                        <div class="hero__banner" style="background-image: url('@img/hero.jpg');">
                            <div class="hero__offer">
                                <h1 class="hero__title title-lg">РЕЗУЛЬТАТЫ ПОИСКА</h1>
                            </div>
                            <form action="search.html" method="get" class="hero__search">
                                <button type="submit" aria-label="Искать" class="hero__search-btn icon-search"></button>
                                <input type="text" name="q" value="тайский массаж" class="hero__search-input" placeholder="Поиск услуг...">
                            </form>
                        </div>
                        <form action="search.html" method="get" class="hero__search hero__search--mobile">
                            <button type="submit" aria-label="Искать" class="hero__search-btn icon-search"></button>
                            <input type="text" name="q" value="тайский массаж" class="hero__search-input" placeholder="Поиск услуг...">
                        </form>
                    </div>
                </section>

                <section class="catalog catalog--search">
                    <div class="container container-lg">
                        <h2 class="catalog__query">тайский массаж</h2>
                        <div class="catalog__grid">
                            @@loop('./html/templates/_product.html', './html/json/search-results.json')
                        </div>
                    </div>
                </section>
            </main>
            @@include('html/_footer.html', {})
        </div>

        @@include('html/_js.html', {})
    </body>
</html>
